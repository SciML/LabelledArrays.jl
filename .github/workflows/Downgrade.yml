name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    if: false  # Disabled: OrdinaryDiffEq minimum version requires StaticArrays 0.8-0.12, conflicts with StaticArrays >= 1.0 compat
    name: "Downgrade"
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      skip: "Pkg,TOML"
    secrets: "inherit"
